@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap');

/* Modern Notifications Widget Styles - Glassmorphism SaaS Style */
.modern-notifications-widget {
    position: fixed !important;
    top: 120px !important;
    right: 20px !important;
    width: 480px;
    min-width: 400px;
    max-width: min(600px, calc(100vw - 40px));
    max-height: min(600px, calc(100vh - 140px));
    /* Glassmorphism - темно-синий градиент с полупрозрачностью */
    background: rgba(20, 30, 60, 0.85) !important;
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.15) !important;
    border-radius: 20px;
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4), 0 12px 24px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.1);
    z-index: 999999 !important;
    display: flex;
    flex-direction: column;
    pointer-events: auto;
    /* Используем Montserrat */
    font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    animation: slideInFromRight 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    resize: horizontal;
    overflow: hidden;
}

/* ИСПРАВЛЕНИЕ: Добавляем класс для скрытия виджета при первичной загрузке */
.modern-notifications-widget.initial-hidden {
    display: none !important;
    visibility: hidden !important;
    opacity: 0 !important;
}

/* Дополнительные стили для предотвращения мигания */
.modern-notifications-widget.closed {
    display: none !important;
    visibility: hidden !important;
    opacity: 0 !important;
    transform: translateX(200%) !important; /* Увеличиваем до 200% для гарантированного скрытия */
    right: -200px !important; /* Дополнительное смещение вправо */
    position: fixed !important;
    clip-path: inset(0 100% 0 0) !important; /* Обрезаем виджет полностью */
}

/* Дополнительная защита от мигания */
.modern-notifications-widget.initial-hidden {
    display: none !important;
    visibility: hidden !important;
    opacity: 0 !important;
}

.modern-notifications-widget.show {

}

<script>
// ИСПРАВЛЕНИЕ: Добавляем глобальный try-catch для предотвращения блокировки UI
try {
    console.log('[ModernWidget] 🚀 Инициализация виджета уведомлений...');

    const notificationsWidgetStorageScope = 'user-{{ current_user.id }}';
    const notificationsWidgetScopedKeys = new Set([
        'notificationsMinimized',
        'notificationsWidgetClosed',
        'notificationsWidgetClosedByUser',
        'notificationsWidgetDisabled',
        'notificationSoundDisabled',
        'seenNotificationIds',
        'lastNotificationCheck',
        'lastSoundPlay',
    ]);
    const notificationsWidgetBrowserStorage = window.localStorage;
    const notificationsWidgetStorageKey = (key) => (
        notificationsWidgetScopedKeys.has(key)
            ? `${key}::${notificationsWidgetStorageScope}`
            : key
    );

    const cleanupLegacyNotificationsWidgetStorage = () => {
        try {
            notificationsWidgetScopedKeys.forEach((key) => {
                const scopedKey = notificationsWidgetStorageKey(key);
                if (
                    notificationsWidgetBrowserStorage.getItem(scopedKey) === null &&
                    notificationsWidgetBrowserStorage.getItem(key) !== null
                ) {
                    notificationsWidgetBrowserStorage.removeItem(key);
                }
            });
        } catch (error) {
            console.warn('[ModernWidget] ⚠️ Не удалось очистить legacy storage виджета:', error);
        }
    };

    cleanupLegacyNotificationsWidgetStorage();

    const localStorage = {
        getItem(key) {
            return notificationsWidgetBrowserStorage.getItem(
                notificationsWidgetStorageKey(key)
            );
        },
        setItem(key, value) {
            return notificationsWidgetBrowserStorage.setItem(
                notificationsWidgetStorageKey(key),
                value
            );
        },
        removeItem(key) {
            return notificationsWidgetBrowserStorage.removeItem(
                notificationsWidgetStorageKey(key)
            );
        },
    };

    class ModernNotificationsWidget {
        constructor() {
            // Проверяем, не инициализирован ли уже виджет
            if (window.notificationsWidgetInitialized) {
                console.log('[ModernWidget] ⚠️ Виджет уже инициализирован, пропускаем повторную инициализацию');
                return;
            }

            try {
                this.widget = document.getElementById('modern-notifications-widget');
                this.list = document.getElementById('notifications-list');
                this.badge = document.getElementById('notification-count-badge');
                this.subtitle = document.getElementById('notification-subtitle');
                this.notifications = [];
                this.isMinimized = false;

                // ИСПРАВЛЕНО: Переиспользуемый аудио объект и контроль частоты воспроизведения
                this.audio = null;
                this.lastPlayAttempt = 0;
                this.minPlayInterval = 1500; // 1.5 секунды между воспроизведениями
                this.audioInitialized = false;

                // Инициализируем аудио объект
                this.initializeAudio();

                // Обработчик для разблокировки аудио после взаимодействия пользователя
                this.setupAudioUnblockHandler();

                const missingElements = [];
                if (!this.widget) missingElements.push('modern-notifications-widget');
                if (!this.list) missingElements.push('notifications-list');
                if (!this.badge) missingElements.push('notification-count-badge');
                if (!this.subtitle) missingElements.push('notification-subtitle');

                if (missingElements.length > 0) {
                    console.warn('[ModernWidget] ⚠️ Не найдены элементы:', missingElements.join(', '));
                    console.warn('[ModernWidget] ⚠️ Виджет может не работать корректно');

                    if (!this.widget) {
                        console.error('[ModernWidget] ❌ Критическая ошибка: основной элемент виджета не найден');
                        return;
                    }
                }

                this.loadWidgetState();
                this.bindEvents();
                this.startPolling();

                console.log('[ModernWidget] ✅ Инициализация завершена');
                // Устанавливаем флаг инициализации
                window.notificationsWidgetInitialized = true;
            } catch (error) {
                console.error('[ModernWidget] ❌ Ошибка в конструкторе:', error);
                if (this.widget) {
                    this.widget.style.display = 'none';
                }
            }
        }

        bindEvents() {
            try {
                document.addEventListener('click', (e) => {
                    if (e.target.closest('#close-notifications')) {
                        console.log('[ModernWidget] 🔘 Клик по кнопке закрытия виджета');
                        this.closeWidget();
                        return;
                    }

                    if (e.target.closest('#minimize-notifications')) {
                        console.log('[ModernWidget] 📏 Клик по кнопке минимизации');
                        this.toggleMinimize();
                        return;
                    }

                    if (e.target.closest('#clear-notifications-modern')) {
                        console.log('[ModernWidget] 🧹 Клик по кнопке очистки уведомлений');
                        this.clearNotifications();
                        return;
                    }

                    const markReadButton = e.target.closest('.mark-read-btn');
                    if (markReadButton) {
                        e.preventDefault();
                        const notificationId = markReadButton.getAttribute('data-id');
                        if (notificationId && notificationId.startsWith('redmine_')) {
                            const redmineId = notificationId.replace('redmine_', '');
                            console.log(`[ModernWidget] ✅ Клик по кнопке "Прочитано" для Redmine ID: ${redmineId}`);
                            this.markRedmineNotificationAsRead(redmineId);
                        }
                        return;
                    }

                    if (e.target.closest('#view-all-notifications')) {
                        console.log('[ModernWidget] 📋 Переход к странице всех уведомлений');
                        window.location.href = '/notifications';
                        return;
                    }

                    if (e.target.closest('#notification-settings')) {
                        console.log('[ModernWidget] ⚙️ Переход к настройкам уведомлений');
                        this.openNotificationSettings();
                        return;
                    }
                });

                document.addEventListener('dblclick', (e) => {
                    if (e.target.closest('.header-icon')) {
                        console.log('[ModernWidget] 🔊 Тестирование звука по двойному клику');
                        this.playNotificationSound();
                    }
                });

                // Добавляем обработчик для растягивания виджета
                this.addResizeHandler();

                console.log('[ModernWidget] ✅ События привязаны через делегирование');
            } catch (error) {
                console.error('[ModernWidget] ❌ Ошибка привязки событий:', error);
            }
        }

                addResizeHandler() {
            try {
                if (!this.widget) {
                    console.error('[ModernWidget] ❌ Виджет не найден для добавления обработчика растягивания');
                    return;
                }

                let isResizing = false;
                let startX, startWidth, startRight;

                const handleMouseDown = (e) => {
                    console.log('[ModernWidget] 🖱️ MouseDown event triggered');

                    // Проверяем, что клик был в левой части виджета (область растягивания)
                    const rect = this.widget.getBoundingClientRect();
                    const clickX = e.clientX - rect.left;

                    console.log('[ModernWidget] 📍 Click position:', clickX, 'Widget width:', rect.width);

                    // Если клик был в левой части виджета (первые 10px)
                    if (clickX < 10) {
                        console.log('[ModernWidget] 🔧 Starting resize operation');
                        isResizing = true;
                        startX = e.clientX;
                        startWidth = this.widget.offsetWidth;
                        startRight = rect.right;
                        document.addEventListener('mousemove', handleMouseMove);
                        document.addEventListener('mouseup', handleMouseUp);
                        e.preventDefault();
                        e.stopPropagation();
                        this.widget.style.cursor = 'ew-resize';
                        this.widget.style.userSelect = 'none';
                    }
                };

                const handleMouseMove = (e) => {
                    if (!isResizing) return;

                    console.log('[ModernWidget] 🔄 MouseMove during resize');
                    const deltaX = startX - e.clientX;
                    const newWidth = Math.max(400, Math.min(600, startWidth + deltaX));

                    console.log('[ModernWidget] 📏 New width:', newWidth, 'Delta:', deltaX);

                    // Обновляем ширину и позицию виджета
                    this.widget.style.width = newWidth + 'px';
                    this.widget.style.right = (window.innerWidth - startRight + deltaX) + 'px';
                };

                const handleMouseUp = () => {
                    console.log('[ModernWidget] 🖱️ MouseUp - ending resize');
                    isResizing = false;
                    this.widget.style.cursor = 'default';
                    this.widget.style.userSelect = 'auto';
                    document.removeEventListener('mousemove', handleMouseMove);
                    document.removeEventListener('mouseup', handleMouseUp);
                };

                // Добавляем обработчик для изменения курсора при наведении
                const handleMouseMoveOver = (e) => {
                    const rect = this.widget.getBoundingClientRect();
                    const mouseX = e.clientX - rect.left;

                    if (mouseX < 10) {
                        this.widget.style.cursor = 'ew-resize';
                        console.log('[ModernWidget] 👆 Cursor changed to resize');
                    } else {
                        this.widget.style.cursor = 'default';
                    }
                };

                // Добавляем обработчик для сброса курсора при выходе мыши
                const handleMouseLeave = () => {
                    this.widget.style.cursor = 'default';
                    console.log('[ModernWidget] 👋 Mouse left widget');
                };

                // Привязываем обработчики событий
                this.widget.addEventListener('mousedown', handleMouseDown, true);
                this.widget.addEventListener('mousemove', handleMouseMoveOver, true);
                this.widget.addEventListener('mouseleave', handleMouseLeave, true);

                // Также добавляем обработчики на сам элемент resize-handle
                const resizeHandle = this.widget.querySelector('.resize-handle');
                if (resizeHandle) {
                    resizeHandle.addEventListener('mousedown', handleMouseDown, true);
                    resizeHandle.addEventListener('mouseover', () => {
                        this.widget.style.cursor = 'ew-resize';
                        console.log('[ModernWidget] 👆 Cursor changed to resize (handle)');
                    }, true);
                    console.log('[ModernWidget] ✅ Обработчики добавлены на resize-handle');
                }

                console.log('[ModernWidget] ✅ Обработчик растягивания добавлен с отладкой');
            } catch (error) {
                console.error('[ModernWidget] ❌ Ошибка добавления обработчика растягивания:', error);
            }
        }

        toggleMinimize() {
            try {
                console.log('[ModernWidget] 📏 Переключение сворачивания виджета');

                this.isMinimized = !this.isMinimized;

                if (this.isMinimized) {
                    console.log('[ModernWidget] 📏 Сворачиваем виджет');
                    this.widget.classList.add('minimized');
                    this.widget.style.maxHeight = '70px';
                } else {
                    console.log('[ModernWidget] 📏 Разворачиваем виджет');
                    this.widget.classList.remove('minimized');
                    this.widget.style.maxHeight = '600px';
                }

                const icon = document.querySelector('#minimize-notifications i');
                if (icon) {
                    icon.className = this.isMinimized ? 'fas fa-chevron-down' : 'fas fa-chevron-up';
                    console.log('[ModernWidget] 📏 Иконка изменена на:', icon.className);
                }

                localStorage.setItem('notificationsMinimized', this.isMinimized);
                console.log('[ModernWidget] ✅ Состояние сворачивания сохранено:', this.isMinimized);
            } catch (error) {
                console.error('[ModernWidget] ❌ Ошибка в toggleMinimize:', error);
            }
        }

        closeWidget() {
            try {
                console.log('[ModernWidget] 🔘 Закрытие виджета...');

                // Применяем скрытие только к основному виджету, не к кнопке восстановления
                this.widget.classList.add('hidden');
                this.widget.style.transform = 'translateX(200%)'; // Увеличиваем до 200%
                this.widget.style.opacity = '0';
                this.widget.style.pointerEvents = 'none'; // Отключаем взаимодействие
                this.widget.style.right = '-200px'; // Дополнительное смещение вправо
                this.widget.style.clipPath = 'inset(0 100% 0 0)'; // Обрезаем виджет полностью

                setTimeout(() => {
                    this.widget.classList.add('closed');
                    this.widget.style.display = 'none';
                    this.widget.style.visibility = 'hidden'; // Дополнительное скрытие
                    localStorage.setItem('notificationsWidgetClosed', 'true');
                    // Добавляем флаг, что виджет был закрыт пользователем
                    localStorage.setItem('notificationsWidgetClosedByUser', 'true');

                    // Показываем кнопку восстановления с задержкой
                    setTimeout(() => {
                        this.showRestoreButton();
                        console.log('[ModernWidget] ✅ Виджет закрыт пользователем, показана кнопка восстановления');
                    }, 100);

                }, 300);
            } catch (error) {
                console.error('[ModernWidget] ❌ Ошибка в closeWidget:', error);
            }
        }

        showWidget() {
            try {
                console.log('[ModernWidget] 🔔 Показ виджета...');

                // КРИТИЧЕСКАЯ ПРОВЕРКА: Виджет должен быть включен в БД
                const widgetDisabled = localStorage.getItem('notificationsWidgetDisabled') === 'true';
                if (widgetDisabled) {
                    console.log('[ModernWidget] 🔕 Виджет отключен в БД, не показываем');
                    this.widget.style.display = 'none';
                    this.widget.classList.add('closed', 'initial-hidden');
                    this.widget.style.visibility = 'hidden';
                    this.widget.style.opacity = '0';
                    this.hideRestoreButton();
                    return;
                }

                // Сбрасываем только состояние видимости, дизайн управляется CSS
                this.widget.classList.remove('closed', 'hidden', 'initial-hidden');
                this.widget.classList.add('show');
                this.widget.style.setProperty('display', 'flex', 'important');
                this.widget.style.setProperty('visibility', 'visible', 'important');
                this.widget.style.setProperty('opacity', '1', 'important');
                this.widget.style.setProperty('transform', 'translateX(0)', 'important');
                this.widget.style.setProperty('clip-path', 'none', 'important');
                this.widget.style.setProperty('right', '20px', 'important');
                this.widget.style.setProperty('pointer-events', 'auto', 'important');
                this.widget.style.removeProperty('background');
                this.widget.style.removeProperty('background-image');
                this.widget.style.removeProperty('backdrop-filter');
                this.widget.style.removeProperty('border');
                this.widget.style.removeProperty('box-shadow');
                this.widget.style.removeProperty('font-family');

                // Сбрасываем localStorage
                localStorage.setItem('notificationsWidgetClosed', 'false');
                localStorage.removeItem('notificationsWidgetClosedByUser');

                // Скрываем кнопку восстановления
                this.hideRestoreButton();

                // Обновляем уведомления
                this.updateNotifications();

                console.log('[ModernWidget] ✅ Виджет развернут и обновлен');
            } catch (error) {
                console.error('[ModernWidget] ❌ Ошибка в showWidget:', error);
            }
        }

        showRestoreButton() {
            try {
                const restoreBtn = document.getElementById('notifications-restore-btn');
                if (restoreBtn) {
                    // Принудительно показываем кнопку восстановления
                    restoreBtn.style.display = 'block';
                    restoreBtn.style.visibility = 'visible';
                    restoreBtn.style.opacity = '1';
                    restoreBtn.style.transform = 'none';
                    restoreBtn.style.right = '20px';
                    restoreBtn.style.bottom = '20px';
                    restoreBtn.style.position = 'fixed';
                    restoreBtn.style.zIndex = '999999';

                    // Принудительно исправляем стили кнопки восстановления
                    setTimeout(() => {
                        if (window.fixRestoreButton) {
                            window.fixRestoreButton();
                        }
                    }, 100);

                    console.log('[ModernWidget] ✅ Кнопка восстановления принудительно показана');
                }
            } catch (error) {
                console.error('[ModernWidget] ❌ Ошибка в showRestoreButton:', error);
            }
        }

        hideRestoreButton() {
            try {
                const restoreBtn = document.getElementById('notifications-restore-btn');
                if (restoreBtn) {
                    restoreBtn.style.display = 'none';
                }
            } catch (error) {
                console.error('[ModernWidget] ❌ Ошибка в hideRestoreButton:', error);
            }
        }

        // НОВЫЙ МЕТОД: Инициализация переиспользуемого аудио объекта
        initializeAudio() {
            try {
                console.log('[ModernWidget] 🔊 Инициализация переиспользуемого аудио объекта...');

                this.audio = new Audio("{{ url_for('static', filename='sounds/notification.mp3') }}");
                this.audio.volume = 0.5;
                this.audio.preload = 'auto';

                // Обработчики событий аудио
                this.audio.addEventListener('canplay', () => {
                    this.audioInitialized = true;
                    console.log('[ModernWidget] ✅ Аудио объект готов к воспроизведению');
                });

                this.audio.addEventListener('error', (e) => {
                    console.error('[ModernWidget] ❌ Ошибка загрузки аудио файла:', e);
                    this.audioInitialized = false;
                });

                this.audio.addEventListener('ended', () => {
                    console.log('[ModernWidget] ⏹️ Воспроизведение завершено');
                });

                console.log('[ModernWidget] ✅ Аудио объект инициализирован');
            } catch (error) {
                console.error('[ModernWidget] ❌ Критическая ошибка инициализации аудио:', error);
                this.audio = null;
                this.audioInitialized = false;
            }
        }

        loadWidgetState() {
            try {
                const isClosed = localStorage.getItem('notificationsWidgetClosed') === 'true';
                const isMinimized = localStorage.getItem('notificationsMinimized') === 'true';
                const isDisabled = localStorage.getItem('notificationsWidgetDisabled') === 'true';
                const isWidgetClosedByUser = localStorage.getItem('notificationsWidgetClosedByUser') === 'true';

                console.log('[ModernWidget] 🔧 Загрузка состояния виджета:', { isClosed, isMinimized, isDisabled, isWidgetClosedByUser });

                // Проверяем состояние уведомлений из базы данных
                this.checkNotificationStatusFromDB();

                // Если виджет был закрыт пользователем, показываем его закрытым при инициализации
                if (isWidgetClosedByUser) {
                    console.log('[ModernWidget] 🔒 Виджет был закрыт пользователем - показываем закрытым при инициализации');
                    this.widget.classList.add('closed', 'initial-hidden');
                    this.widget.style.display = 'none';
                    this.widget.style.visibility = 'hidden';
                    this.widget.style.opacity = '0';
                    this.showRestoreButton();
                    return;
                }

                if (isDisabled) {
                    console.log('[ModernWidget] 🔕 Виджет отключен, скрываем полностью включая кнопку восстановления');
                    this.widget.style.display = 'none';
                    this.widget.classList.add('closed', 'initial-hidden');
                    this.hideRestoreButton();
                    return;
                }

                // Если виджет не был закрыт пользователем, показываем его
                this.widget.classList.remove('initial-hidden');
                this.widget.style.display = 'flex';
                this.widget.style.visibility = 'visible';
                this.widget.style.opacity = '1';
                this.widget.style.transform = 'translateX(0)';
                this.widget.style.clipPath = 'none';

                console.log('[ModernWidget] ✅ Виджет инициализирован и готов к автоматическому появлению');
            } catch (error) {
                console.error('[ModernWidget] ❌ Ошибка в loadWidgetState:', error);
            }
        }

        checkNotificationStatusFromDB() {
            try {
                console.log('[ModernWidget] 🔍 Проверка состояния уведомлений из базы данных...');

                fetch('/api/notifications/status')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        console.log('[ModernWidget] 📊 Состояние уведомлений из БД:', data.enabled);

                        if (!data.enabled) {
                            console.log('[ModernWidget] 🔕 Уведомления отключены в БД, скрываем виджет');
                            this.widget.style.display = 'none';
                            this.widget.classList.add('closed', 'initial-hidden');
                            this.widget.style.visibility = 'hidden';
                            this.widget.style.opacity = '0';
                            this.hideRestoreButton();
                            localStorage.setItem('notificationsWidgetDisabled', 'true');
                        } else {
                            console.log('[ModernWidget] ✅ Уведомления включены в БД');
                            localStorage.removeItem('notificationsWidgetDisabled');
                        }
                    } else {
                        console.error('[ModernWidget] ❌ Ошибка получения состояния уведомлений:', data.error);
                    }
                })
                .catch(error => {
                    console.error('[ModernWidget] ❌ Ошибка запроса состояния уведомлений:', error);
                });
            } catch (error) {
                console.error('[ModernWidget] ❌ Ошибка в checkNotificationStatusFromDB:', error);
            }
        }

        adjustWidgetPosition() {
            try {
                const header = document.querySelector('nav, header, .navbar, .nav, .header');
                if (header) {
                    const headerHeight = header.offsetHeight;
                    const topOffset = Math.max(headerHeight + 40, 120);
                    this.widget.style.setProperty('top', `${topOffset}px`, 'important');
                    console.log(`[ModernWidget] Adjusted position: ${topOffset}px (header height: ${headerHeight}px)`);
                } else {
                    this.widget.style.setProperty('top', '120px', 'important');
                    console.log(`[ModernWidget] Header not found, using safe offset: 120px`);
                }
            } catch (error) {
                console.error('[ModernWidget] ❌ Ошибка в adjustWidgetPosition:', error);
                this.widget.style.setProperty('top', '120px', 'important');
            }
        }

        forcePosition() {
            try {
                this.widget.style.setProperty('position', 'fixed', 'important');
                this.widget.style.setProperty('z-index', '999999', 'important');
                this.widget.style.setProperty('right', '20px', 'important');

                const rect = this.widget.getBoundingClientRect();
                console.log(`[ModernWidget] Position check:`, {
                    top: rect.top,
                    right: rect.right,
                    bottom: rect.bottom,
                    left: rect.left,
                    visible: rect.top >= 0 && rect.left >= 0
                });

                if (rect.top < 60) {
                    this.widget.style.setProperty('top', '120px', 'important');
                    console.log(`[ModernWidget] Widget was hidden, forced to 120px`);
                }
            } catch (error) {
                console.error('[ModernWidget] ❌ Ошибка в forcePosition:', error);
            }
        }

        async startPolling() {
            try {
                setInterval(() => this.updateNotifications(), 30000);
                // Периодически проверяем состояние виджета из БД (каждые 60 секунд)
                setInterval(() => this.checkNotificationStatusFromDB(), 60000);
                this.updateNotifications();
                // Проверяем состояние при старте
                this.checkNotificationStatusFromDB();
            } catch (error) {
                console.error('[ModernWidget] ❌ Ошибка в startPolling:', error);
            }
        }

        async updateNotifications() {
            try {
                const isWidgetDisabled = localStorage.getItem('notificationsWidgetDisabled') === 'true';
                if (isWidgetDisabled) {
                    console.log('[ModernWidget] 🔕 Виджет отключен, пропускаем обновление уведомлений');
                    return;
                }

                console.log('[ModernWidget] 🔄 Запрос обновления уведомлений...');
                const response = await fetch('/api/notifications/poll');
                const data = await response.json();

                if (data.success) {
                    console.log(`[ModernWidget] 📡 Получены данные с сервера:`, data);

                    this.processNotifications(data.notifications);
                    const localCount = this.notifications.length;
                    const serverCount = data.total_count || 0;
                    const displayCount = Math.max(localCount, serverCount);

                    console.log(`[ModernWidget] 🔢 Счетчики: локальный=${localCount}, сервер=${serverCount}, отображаем=${displayCount}`);
                    this.updateBadge(displayCount);
                } else {
                    console.warn('[ModernWidget] ⚠️ Сервер вернул ошибку:', data.error || 'Неизвестная ошибка');
                }
            } catch (error) {
                console.error('[ModernWidget] ❌ Ошибка получения уведомлений:', error);
            }
        }

                                          (notifications.comment_notifications && notifications.comment_notifications.length > 0) ||
                                          (notifications.redmine_notifications && notifications.redmine_notifications.length > 0);

                console.log('- isWidgetClosedByUser:', isWidgetClosedByUser);
                console.log('- notifications.status_notifications:', notifications.status_notifications?.length || 0);
                console.log('- notifications.comment_notifications:', notifications.comment_notifications?.length || 0);

                        });
                    });
                }

                if (notifications.comment_notifications) {
                    notifications.comment_notifications.forEach(n => {
                        console.log(`[ModernWidget] 💬 Comment notification: #${n.issue_id} - ${n.date_created}`);
                        this.notifications.push({
                            id: `comment_${n.id}`,
                            type: 'comment',
                            title: `Новый комментарий: #${n.issue_id}`,
                            description: this.truncate(n.notes, 100),
                            time: this.formatTime(n.date_created),
                            icon: 'fas fa-comment',
                            issue_id: n.issue_id,

                if (notifications.redmine_notifications) {

                        const descriptionDetails = n.issue_description ? ` — ${this.truncate(n.issue_description.replace(/<.*?>/g, ''), 70)}` : '';
                        const isGroupNotification = !!n.is_group_notification;
                        let title = '';
                        let description = '';

                        const source = n.easy_email_to ? `От: ${n.easy_email_to}` : '';

                        if (isGroupNotification) {
                            title = `Задача для группы: ${n.group_name || 'Без имени'}`;
                            description = `<b>#${n.redmine_issue_id}</b>: ${n.issue_subject}${descriptionDetails}`;
                        } else {
                            title = 'Вам назначена задача';
                            description = `<b>#${n.redmine_issue_id}</b>: ${n.issue_subject}${descriptionDetails}`;
                        }

                        this.notifications.push({
                            id: `redmine_${n.id}`,
                            type: 'redmine-task',
                            title: title,
                            description: description,

                            url: n.issue_url,
                            group_name: n.group_name,
                            source: source,
                            easy_email_to: n.easy_email_to,
                            raw: n // ИСПРАВЛЕНО: Добавляем raw данные для правильной сортировки
                        });
                    });
                }

                console.log(`[ModernWidget] 📋 Всего обработано уведомлений: ${this.notifications.length}`);
                console.log('[ModernWidget] 📋 Порядок уведомлений в массиве:');
                this.notifications.forEach((n, index) => {
                    console.log(`  ${index + 1}. ${n.type} - ${n.title} (${n.time})`);
                });

                                // ИСПРАВЛЕНО: Более надежная логика определения новых уведомлений для продакшена
                const incomingIds = this.notifications.map(n => n.id);
                let seenIds = JSON.parse(localStorage.getItem('seenNotificationIds')) || [];

                // НОВОЕ: Очистка старых записей для предотвращения накопления
                const maxHistorySize = 50;
                if (seenIds.length > maxHistorySize) {
                    seenIds = seenIds.slice(-30);
                    localStorage.setItem('seenNotificationIds', JSON.stringify(seenIds));
                    console.log('[ModernWidget] 🧹 Очищена история seen IDs, осталось:', seenIds.length);
                }

                const newNotificationIds = incomingIds.filter(id => !seenIds.includes(id));

                // КРИТИЧЕСКАЯ ДИАГНОСТИКА ДЛЯ ПРОДАКШЕНА
                console.log('[ModernWidget] 🐛 ПОДРОБНАЯ ДИАГНОСТИКА ДЛЯ ОТЛАДКИ:');
                console.log('[ModernWidget] 🐛 Incoming IDs полностью:', incomingIds);
                console.log('[ModernWidget] 🐛 Seen IDs полностью:', seenIds);
                console.log('[ModernWidget] 🐛 New IDs полностью:', newNotificationIds);

                // Детальная проверка каждого ID
                incomingIds.forEach(id => {
                    const isSeen = seenIds.includes(id);
                    console.log(`[ModernWidget] 🐛 ID ${id}: ${isSeen ? 'УЖЕ ВИДЕЛИ' : 'НОВЫЙ'}`);
                });

                const now = Date.now();
                const lastNotificationCheck = parseInt(localStorage.getItem('lastNotificationCheck')) || 0;
                const lastSoundPlay = parseInt(localStorage.getItem('lastSoundPlay')) || 0;
                const minCheckInterval = 2000;
                const minSoundInterval = 1000; // 1 секунда между звуками
                const timeSinceLastCheck = now - lastNotificationCheck;
                const timeSinceLastSound = now - lastSoundPlay;

                console.log('[ModernWidget] 📊 Расширенная диагностика уведомлений:', {
                    incoming: incomingIds.length,
                    seen: seenIds.length,
                    new: newNotificationIds.length,
                    timeSinceLastCheck: timeSinceLastCheck,
                    timeSinceLastSound: timeSinceLastSound,
                    minCheckInterval: minCheckInterval,
                    minSoundInterval: minSoundInterval,
                    timestamp: new Date().toLocaleTimeString()
                });

                // КРИТИЧЕСКАЯ ПРОВЕРКА: Виджет должен быть включен в БД
                const widgetDisabled = localStorage.getItem('notificationsWidgetDisabled') === 'true';
                if (widgetDisabled) {
                    console.log('[ModernWidget] 🔕 Виджет отключен, не показываем и не воспроизводим звук');
                    this.widget.style.display = 'none';
                    this.widget.classList.add('closed', 'initial-hidden');
                    this.widget.style.visibility = 'hidden';
                    this.widget.style.opacity = '0';
                    this.hideRestoreButton();
                    return; // Прекращаем обработку, если виджет отключен
                }

                // НОВАЯ ЛОГИКА: Более либеральная проверка для продакшена
                let shouldPlaySound = false;
                let soundReason = '';

                if (newNotificationIds.length > 0) {
                    if (timeSinceLastSound >= minSoundInterval) {
                        shouldPlaySound = true;
                        soundReason = 'Новые уведомления + достаточно времени с последнего звука';
                    } else {
                        soundReason = `Новые уведомления, но звук слишком рано (${timeSinceLastSound}мс < ${minSoundInterval}мс)`;
                    }
                } else if (this.notifications.length > 0 && seenIds.length === 0) {
                    // FALLBACK: Если нет seen записей вообще, но есть уведомления
                    shouldPlaySound = true;
                    soundReason = 'Fallback: первые уведомления (нет истории seen)';
                } else if (this.notifications.length > 0 && timeSinceLastCheck > 30000) {
                    // FALLBACK: Если прошло много времени с последней проверки
                    shouldPlaySound = true;
                    soundReason = 'Fallback: прошло много времени с последней проверки';
                } else {
                    soundReason = 'Нет новых уведомлений или условия не выполнены';
                }

                console.log(`[ModernWidget] 🔍 РЕШЕНИЕ О ЗВУКЕ: ${shouldPlaySound ? 'ВОСПРОИЗВОДИТЬ' : 'НЕ ВОСПРОИЗВОДИТЬ'}`);
                console.log(`[ModernWidget] 🔍 ПРИЧИНА: ${soundReason}`);

                if (shouldPlaySound) {
                    console.log('[ModernWidget] 🎶 Обнаружены уведомления для звука. Детали:', {
                        newIds: newNotificationIds,
                        totalNotifications: this.notifications.length,
                        reason: soundReason
                    });
                    console.log('[ModernWidget] 🔊 Инициируем воспроизведение звука...');

                    this.playNotificationSound();
                    localStorage.setItem('lastSoundPlay', now.toString());

                    // Обновляем seen IDs только если есть новые
                    if (newNotificationIds.length > 0) {
                        const updatedSeenIds = [...seenIds, ...newNotificationIds];
                        localStorage.setItem('seenNotificationIds', JSON.stringify(updatedSeenIds));
                        console.log('[ModernWidget] 💾 Обновлены seen IDs (всего:', updatedSeenIds.length, ')');
                    }

                    localStorage.setItem('lastNotificationCheck', now.toString());
                } else {
                    console.log(`[ModernWidget] 🔇 Звук не воспроизводится: ${soundReason}`);

                    // Всё равно сохраняем новые ID как seen
                    if (newNotificationIds.length > 0) {
                        const updatedSeenIds = [...seenIds, ...newNotificationIds];
                        localStorage.setItem('seenNotificationIds', JSON.stringify(updatedSeenIds));
                        console.log('[ModernWidget] 💾 Сохранены новые seen IDs без звука');
                    }
                }

                this.renderNotifications();
                this.updateBadge(this.notifications.length);
                console.log(`[ModernWidget] 📊 Обработано уведомлений: ${this.notifications.length}`);
            } catch (error) {
                console.error('[ModernWidget] ❌ Ошибка обработки уведомлений:', error);
            }

            // Инициализируем обработчики кнопок после рендеринга
            this.initActionButtons();
        }

        renderNotifications() {
            try {
                console.log('[ModernWidget] 🎨 Начинаем рендеринг уведомлений');
                console.log('[ModernWidget] 📊 Количество уведомлений для рендеринга:', this.notifications.length);

                if (this.notifications.length === 0) {
                    console.log('[ModernWidget] 📭 Нет уведомлений для отображения, показываем пустое состояние');
                    this.list.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon"><i class="fas fa-inbox"></i></div>
                            <p class="empty-text">Все уведомления прочитаны</p>
                            <small class="empty-subtitle">Новые уведомления появятся здесь</small>
                        </div>
                    `;
                    return;
                }

                console.log('[ModernWidget] 📋 Уведомления для рендеринга:');
                this.notifications.forEach((n, index) => {
                    console.log(`  ${index + 1}. ${n.type} - ${n.title} (${n.time})`);
                });

                // ИСПРАВЛЕНО: Улучшенная сортировка уведомлений по времени (самые новые вверху)
                const sortedNotifications = [...this.notifications].sort((a, b) => {
                    // Получаем времена для сортировки
                    const getTimestamp = (notification) => {
                        // Приоритет 1: Если есть raw данные с date_created
                        if (notification.raw && notification.raw.date_created) {
                            const timestamp = new Date(notification.raw.date_created).getTime();
                            console.log(`[ModernWidget] 🔄 Используем date_created для ${notification.title}: ${timestamp}`);
                            return timestamp;
                        }

                        // Приоритет 2: Если есть raw данные с created_at (для Redmine)
                        if (notification.raw && notification.raw.created_at) {
                            const timestamp = new Date(notification.raw.created_at).getTime();
                            console.log(`[ModernWidget] 🔄 Используем created_at для ${notification.title}: ${timestamp}`);
                            return timestamp;
                        }

                        // Приоритет 3: Парсим время из строки "X мин назад" или "X ч назад"
                        const timeStr = notification.time;
                        if (timeStr === 'Только что') {
                            console.log(`[ModernWidget] 🔄 Используем "Только что" для ${notification.title}: ${Date.now()}`);
                            return Date.now();
                        }
                        if (timeStr.includes('мин назад')) {
                            const minutes = parseInt(timeStr.match(/\d+/)[0]);
                            const timestamp = Date.now() - (minutes * 60 * 1000);
                            console.log(`[ModernWidget] 🔄 Используем "мин назад" для ${notification.title}: ${timestamp}`);
                            return timestamp;
                        }
                        if (timeStr.includes('ч назад')) {
                            const hours = parseInt(timeStr.match(/\d+/)[0]);
                            const timestamp = Date.now() - (hours * 60 * 60 * 1000);
                            console.log(`[ModernWidget] 🔄 Используем "ч назад" для ${notification.title}: ${timestamp}`);
                            return timestamp;
                        }
                        if (timeStr.includes('д назад')) {
                            const days = parseInt(timeStr.match(/\d+/)[0]);
                            const timestamp = Date.now() - (days * 24 * 60 * 60 * 1000);
                            console.log(`[ModernWidget] 🔄 Используем "д назад" для ${notification.title}: ${timestamp}`);
                            return timestamp;
                        }

                        // Приоритет 4: Если дата в формате DD.MM.YYYY
                        const dateParts = timeStr.match(/(\d{2})\.(\d{2})\.(\d{4})/);
                        if (dateParts) {
                            const timestamp = new Date(dateParts[3], dateParts[2] - 1, dateParts[1]).getTime();
                            console.log(`[ModernWidget] 🔄 Используем DD.MM.YYYY для ${notification.title}: ${timestamp}`);
                            return timestamp;
                        }

                        // Приоритет 5: Если дата в формате ISO (YYYY-MM-DDTHH:MM:SS)
                        if (timeStr.includes('T') && timeStr.includes('-')) {
                            const timestamp = new Date(timeStr).getTime();
                            console.log(`[ModernWidget] 🔄 Используем ISO формат для ${notification.title}: ${timestamp}`);
                            return timestamp;
                        }

                        console.log(`[ModernWidget] ⚠️ Не удалось определить время для ${notification.title}, используем текущее время`);
                        return Date.now(); // Fallback
                    };

                    const timestampA = getTimestamp(a);
                    const timestampB = getTimestamp(b);

                    console.log(`[ModernWidget] 🔄 Сортировка: ${a.title} (${a.time}) = ${timestampA}, ${b.title} (${b.time}) = ${timestampB}`);

                    return timestampB - timestampA; // Сортировка по убыванию (новые первыми)
                });

                console.log('[ModernWidget] 🔄 Уведомления отсортированы по времени (новые сверху)');
                console.log('[ModernWidget] 📋 Порядок после сортировки:');
                sortedNotifications.forEach((n, index) => {
                    console.log(`  ${index + 1}. ${n.type} - ${n.title} (${n.time})`);
                });

// Функция для форматирования описания с выделением номеров задач
                const formatDescription = (description) => {
                    if (!description) return '';
                    // Заменяем #число на span с классом issue-id
                    return description.replace(/(#\d+)/g, '<span class="issue-id">$1</span>');
                };

                this.list.innerHTML = sortedNotifications.map(notification => {
                    console.log('[ModernWidget] Notification data:', notification); // Для отладки
                    const formattedDescription = formatDescription(notification.description);
                    return `

        formatTime(dateString) {
            try {
                if (!dateString) return 'Только что';
                const date = new Date(dateString);
                const now = new Date();
                const diff = now - date;

                if (diff < 60000) return 'Только что';
                if (diff < 3600000) return `${Math.floor(diff / 60000)} мин назад`;
                if (diff < 86400000) return `${Math.floor(diff / 3600000)} ч назад`;

                return date.toLocaleDateString('ru-RU');
            } catch (error) {
                console.error('[ModernWidget] ❌ Ошибка форматирования времени:', error);
                return 'Только что';
            }
        }

        truncate(text, length) {
            if (!text || typeof text !== 'string') {
                return '';
            }
            if (text.length <= length) {
                return text;
            }
            return text.substring(0, length).trim() + '...';
        }
        
        // Функция склонения слов для русского языка
        declension(count) {
            // Форматы: one - 1, few - 2-4, many - 5-20
            const cases = [2, 0, 1, 1, 1, 2];
            const titles = ['новое уведомление', 'новых уведомления', 'новых уведомлений'];
            
            if (count % 100 > 4 && count % 100 < 21) {
                return `${count} ${titles[2]}`;
            }
            
            return `${count} ${titles[cases[count % 10 < 5 ? count % 10 : 5]]}`;
        }

        playNotificationSound() {
            try {
                console.log('[ModernWidget] 🔊 Попытка воспроизведения звука уведомления...');

                // КРИТИЧЕСКАЯ ПРОВЕРКА: Виджет должен быть включен в БД
                const widgetDisabled = localStorage.getItem('notificationsWidgetDisabled') === 'true';
                if (widgetDisabled) {
                    console.log('[ModernWidget] 🔇 Виджет отключен в БД, не воспроизводим звук');
                    return;
                }

                // НОВОЕ: Проверка минимального интервала между воспроизведениями
                const now = Date.now();
                if (now - this.lastPlayAttempt < this.minPlayInterval) {
                    console.log(`[ModernWidget] 🔇 Слишком частые попытки воспроизведения (интервал: ${now - this.lastPlayAttempt}мс < ${this.minPlayInterval}мс), пропускаем`);
                    return;
                }
                this.lastPlayAttempt = now;

                // Проверка на отключение звука пользователем
                const soundDisabled = localStorage.getItem('notificationSoundDisabled') === 'true';
                if (soundDisabled) {
                    console.log('[ModernWidget] 🔇 Звук уведомлений отключен пользователем, пропускаем воспроизведение');
                    return;
                }

                // НОВОЕ: Проверка доступности переиспользуемого аудио объекта
                if (!this.audio) {
                    console.warn('[ModernWidget] ⚠️ Переиспользуемый аудио объект недоступен, используем fallback');
                    this.fallbackNotificationSound();
                    return;
                }

                // Проверка статуса документа для диагностики
                const isVisible = document.visibilityState === 'visible';
                const hasFocus = document.hasFocus();
                console.log('[ModernWidget] 📊 Статус страницы:', {
                    visibility: document.visibilityState,
                    hasFocus: hasFocus,
                    audioInitialized: this.audioInitialized,
                    timestamp: new Date().toLocaleTimeString()
                });

                // ИСПРАВЛЕНО: Используем переиспользуемый аудио объект
                try {
                    // Сбрасываем позицию на начало для повторного воспроизведения
                    this.audio.currentTime = 0;

                    const playPromise = this.audio.play();

                    if (playPromise !== undefined) {
                        playPromise.then(() => {
                            console.log('[ModernWidget] ✅ Звук успешно воспроизведен через переиспользуемый объект');
                        }).catch(e => {
                            this.handleAudioError(e);
                        });
                    } else {
                        console.warn('[ModernWidget] ⚠️ audio.play() не вернул Promise');
                    }

                    console.log('[ModernWidget] 🔊 Команда воспроизведения отправлена (переиспользуемый объект)');
                } catch (playError) {
                    console.error('[ModernWidget] ❌ Ошибка воспроизведения через переиспользуемый объект:', playError);
                    this.fallbackNotificationSound();
                }
            } catch (error) {
                console.error('[ModernWidget] ❌ Критическая ошибка в playNotificationSound:', error);
                this.fallbackNotificationSound();
            }
        }

        // НОВЫЙ МЕТОД: Централизованная обработка ошибок аудио
        handleAudioError(error) {
            switch (error.name) {
                case 'NotAllowedError':
                    console.log('[ModernWidget] 🔒 Звук заблокирован браузером - требуется взаимодействие пользователя');
                    sessionStorage.setItem('audioBlocked', 'true');
                    break;
                case 'NotSupportedError':
                    console.error('[ModernWidget] ❌ Формат аудио не поддерживается:', error);
                    break;
                case 'AbortError':
                    console.log('[ModernWidget] ⏹️ Воспроизведение прервано пользователем:', error);
                    break;
                default:
                    console.error('[ModernWidget] ❌ Неизвестная ошибка воспроизведения:', error.name, error.message);
            }
        }

        // Новый fallback метод для критических ситуаций
        fallbackNotificationSound() {
            try {
                console.log('[ModernWidget] 🔄 Попытка fallback воспроизведения звука...');
                // Простейший способ без дополнительных обработчиков
                const simpleAudio = new Audio('/static/sounds/notification.mp3');

                simpleAudio.play().catch(() => {
                    console.log('[ModernWidget] 🔇 Fallback воспроизведение также заблокировано');
                });
            } catch (fallbackError) {
                console.error('[ModernWidget] ❌ Даже fallback не сработал:', fallbackError);

        }

        // Настройка обработчика для разблокировки аудио
        setupAudioUnblockHandler() {
            try {
                console.log('[ModernWidget] 🔧 Настройка обработчика разблокировки аудио...');

                const unlockAudio = () => {
                    const audioBlocked = sessionStorage.getItem('audioBlocked') === 'true';
                    if (audioBlocked) {
                        console.log('[ModernWidget] 🔓 Пытаемся разблокировать аудио после взаимодействия пользователя...');

                        try {
                            // Тихий тестовый звук для разблокировки
                            const testAudio = new Audio("{{ url_for('static', filename='sounds/notification.mp3') }}");
                            testAudio.volume = 0.01; // Очень тихо
                            testAudio.play().then(() => {
                                console.log('[ModernWidget] ✅ Аудио успешно разблокировано!');
                                sessionStorage.removeItem('audioBlocked');
                                // Удаляем обработчики после успешной разблокировки
                                document.removeEventListener('click', unlockAudio);
                                document.removeEventListener('keydown', unlockAudio);
                                document.removeEventListener('touchstart', unlockAudio);
                            }).catch((e) => {
                                if (e.name !== 'NotAllowedError') {
                                    console.log('[ModernWidget] 🔓 Разблокировка не удалась, но это не NotAllowedError');
                                    sessionStorage.removeItem('audioBlocked');
                                }
                            });
                        } catch (error) {
                            console.warn('[ModernWidget] ⚠️ Ошибка при попытке разблокировки:', error);
                        }
                    }
                };

                // Добавляем обработчики для различных типов взаимодействия
                document.addEventListener('click', unlockAudio, { once: false });
                document.addEventListener('keydown', unlockAudio, { once: false });
                document.addEventListener('touchstart', unlockAudio, { once: false });

                console.log('[ModernWidget] ✅ Обработчик разблокировки аудио установлен');
            } catch (error) {
                console.error('[ModernWidget] ❌ Ошибка настройки обработчика разблокировки:', error);
            }
        }

        blinkTabTitle() {
            try {
                // Проверяем, активна ли вкладка
                if (document.hidden) {
                    // Проверяем, не мигает ли уже заголовок
                    if (document.title.includes('🆕 Новые уведомления!')) {
                        console.log('[ModernWidget] ℹ️ Мигание уже активно, пропускаем');
                        return;
                    }

                    console.log('[ModernWidget] 🔄 Запускаем постоянное мигание заголовка вкладки');

                    const originalTitle = document.title;

                    const blinkInterval = setInterval(() => {
                        if (document.title === originalTitle) {
                            document.title = '🆕 Новые уведомления! - ' + originalTitle;
                        } else {
                            document.title = originalTitle;
                        }
                    }, 800); // Мигаем каждые 800мс

                    // Останавливаем мигание при активации вкладки
                    const stopBlinking = () => {
                        if (!document.hidden) {
                            clearInterval(blinkInterval);
                            document.title = originalTitle;
                            document.removeEventListener('visibilitychange', stopBlinking);
                            console.log('[ModernWidget] ✅ Остановлено мигание - вкладка активирована');
                        }
                    };

                    document.addEventListener('visibilitychange', stopBlinking);
                } else {
                    console.log('[ModernWidget] ℹ️ Вкладка активна, мигание не нужно');
                }
            } catch (error) {
                console.error('[ModernWidget] ❌ Ошибка мигания заголовка вкладки:', error);
            }
        }

    async function initializeWidgetWithUserPreferences() {
        try {
            const localWidgetDisabled = localStorage.getItem('notificationsWidgetDisabled') === 'true';
            console.log('[ModernWidget] 🔧 Проверка localStorage настроек:', { widgetDisabled: localWidgetDisabled });

            if (localWidgetDisabled) {
                console.log('[ModernWidget] 🔕 Виджет отключен в localStorage, пропускаем инициализацию');
                const widget = document.getElementById('modern-notifications-widget');
                if (widget) {
                    widget.style.display = 'none';
                    widget.classList.add('closed');
                }
                const restoreBtn = document.getElementById('notifications-restore-btn');
                if (restoreBtn) {
                    restoreBtn.style.display = 'none';
                    console.log('[ModernWidget] 🔕 Кнопка восстановления скрыта при отключенном виджете');
                }
                return;
            }

            // Используем правильный endpoint для проверки состояния виджета
            const response = await fetch('/api/notifications/status');
            const data = await response.json();

            if (data.success) {
                if (!data.enabled) {
                    console.log('[ModernWidget] 🔕 Виджет отключен в настройках пользователя, пропускаем инициализацию');
                    localStorage.setItem('notificationsWidgetDisabled', 'true');
                    const widget = document.getElementById('modern-notifications-widget');
                    if (widget) {
                        widget.style.display = 'none';
                        widget.classList.add('closed', 'initial-hidden');
                        widget.style.visibility = 'hidden';
                        widget.style.opacity = '0';
                    }
                    const restoreBtn = document.getElementById('notifications-restore-btn');
                    if (restoreBtn) {
                        restoreBtn.style.display = 'none';
                    }
                    return;
                } else {
                    console.log('[ModernWidget] ✅ Виджет включен в настройках пользователя');
                    localStorage.removeItem('notificationsWidgetDisabled');
                }
            } else {
                console.error('[ModernWidget] ❌ Ошибка получения состояния виджета:', data.error);
            }

            localStorage.setItem('notificationsWidgetDisabled', 'false');
            initializeWidget();

        } catch (error) {
            console.error('[ModernWidget] ❌ Ошибка проверки настроек пользователя:', error);
            const localWidgetDisabled = localStorage.getItem('notificationsWidgetDisabled') === 'true';
            if (localWidgetDisabled) {
                console.log('[ModernWidget] 🔕 Виджет отключен локально, не инициализируем при ошибке сервера');
                const widget = document.getElementById('modern-notifications-widget');
                if (widget) widget.style.display = 'none';
                const restoreBtn = document.getElementById('notifications-restore-btn');
                if (restoreBtn) {
                    restoreBtn.style.display = 'none';
                    console.log('[ModernWidget] 🔕 Кнопка восстановления скрыта при ошибке (виджет отключен)');
                }
                return;
            }

            localStorage.setItem('notificationsWidgetDisabled', 'false');
            initializeWidget();
        }
    }

// 🚀 СОВРЕМЕННЫЕ UX УЛУЧШЕНИЯ
class ModernNotificationsUX {
    constructor() {
        this.widget = null;
        this.notificationsList = null;
        this.isRefreshing = false;
        this.swipeThreshold = 100;
        this.pullThreshold = 80;
        this.init();
    }

    init() {
        // Ждем загрузки DOM
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => this.initializeUX());
        } else {
            this.initializeUX();
        }
    }

    initializeUX() {
        this.widget = document.getElementById('modern-notifications-widget');
        this.notificationsList = document.getElementById('notifications-list');

        if (this.widget && this.notificationsList) {
            this.setupSwipeGestures();
            this.setupPullToRefresh();
            this.setupHapticFeedback();
            this.setupImprovedAnimations();
            console.log('[ModernUX] 🎉 Современные UX улучшения активированы!');
        } else {
            // Повторная попытка через 1 секунду
            setTimeout(() => this.initializeUX(), 1000);
        }
    }

    // 👆 SWIPE ЖЕСТЫ ДЛЯ ЗАКРЫТИЯ УВЕДОМЛЕНИЙ
    setupSwipeGestures() {
        let startX = 0;
        let startY = 0;
        let currentX = 0;
        let currentY = 0;
        let isDragging = false;
        let draggedElement = null;

        this.notificationsList.addEventListener('touchstart', (e) => {
            const notificationItem = e.target.closest('.notification-item');
            if (!notificationItem) return;

            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
            isDragging = true;
            draggedElement = notificationItem;

            // Добавляем класс для анимации
            draggedElement.style.transition = 'none';
            draggedElement.style.zIndex = '1000';

            this.hapticFeedback('light');
        }, { passive: true });

        this.notificationsList.addEventListener('touchmove', (e) => {
            if (!isDragging || !draggedElement) return;

            currentX = e.touches[0].clientX;
            currentY = e.touches[0].clientY;

            const deltaX = currentX - startX;
            const deltaY = currentY - startY;

            // Проверяем, что это горизонтальный swipe
            if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 10) {
                e.preventDefault();

                // Применяем трансформацию с улучшенной физикой
                const progress = Math.min(Math.abs(deltaX) / this.swipeThreshold, 1);
                const opacity = Math.max(0.3, 1 - progress * 0.7);
                const rotation = deltaX * 0.05; // Уменьшенная ротация для более естественного вида
                const scale = 1 - progress * 0.05; // Небольшое уменьшение при swipe

                draggedElement.style.transform = `translateX(${deltaX}px) rotate(${rotation}deg) scale(${scale})`;
                draggedElement.style.opacity = opacity;

                // Улучшенная визуальная обратная связь
                if (deltaX > 30) {
                    draggedElement.style.backgroundColor = 'rgba(34, 197, 94, 0.15)';
                    draggedElement.style.borderColor = 'rgba(34, 197, 94, 0.3)';
                    // Показываем иконку "прочитано"
                    this.showSwipeIcon(draggedElement, 'check', 'right');
                } else if (deltaX < -30) {
                    draggedElement.style.backgroundColor = 'rgba(239, 68, 68, 0.15)';
                    draggedElement.style.borderColor = 'rgba(239, 68, 68, 0.3)';
                    // Показываем иконку "удалить"
                    this.showSwipeIcon(draggedElement, 'trash', 'left');
                } else {
                    draggedElement.style.backgroundColor = '';
                    draggedElement.style.borderColor = '';
                    this.hideSwipeIcon(draggedElement);
                }

                // Haptic feedback при достижении порога
                if (Math.abs(deltaX) > this.swipeThreshold * 0.8 && !draggedElement.dataset.hapticTriggered) {
                    this.hapticFeedback('light');
                    draggedElement.dataset.hapticTriggered = 'true';
                }
            }
        }, { passive: false });

        this.notificationsList.addEventListener('touchend', (e) => {
            if (!isDragging || !draggedElement) return;

            const deltaX = currentX - startX;
            const shouldDismiss = Math.abs(deltaX) > this.swipeThreshold;

            if (shouldDismiss) {
                // Анимация удаления
                draggedElement.style.transition = 'all 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
                draggedElement.style.transform = `translateX(${deltaX > 0 ? '100%' : '-100%'}) rotate(${deltaX > 0 ? '10deg' : '-10deg'})`;
                draggedElement.style.opacity = '0';

                this.hapticFeedback('medium');

                // Удаляем элемент после анимации
                setTimeout(() => {
                    if (draggedElement && draggedElement.parentNode) {
                        draggedElement.remove();
                        this.showSwipeToast(deltaX > 0 ? 'Уведомление отмечено как прочитанное' : 'Уведомление удалено');
                    }
                }, 300);
            } else {
                // Возвращаем на место
                draggedElement.style.transition = 'all 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
                draggedElement.style.transform = 'translateX(0) rotate(0)';
                draggedElement.style.opacity = '1';
                draggedElement.style.backgroundColor = '';
            }

            // Сброс состояния
            setTimeout(() => {
                if (draggedElement) {
                    draggedElement.style.transition = '';
                    draggedElement.style.zIndex = '';
                    draggedElement.style.backgroundColor = '';
                    draggedElement.style.borderColor = '';
                    draggedElement.dataset.hapticTriggered = '';
                    this.hideSwipeIcon(draggedElement);
                }
            }, 300);

            isDragging = false;
            draggedElement = null;
        }, { passive: true });
    }

    // 🎯 ПОКАЗ ИКОНОК ПРИ SWIPE
    showSwipeIcon(element, iconType, side) {
        let icon = element.querySelector('.swipe-icon');
        if (!icon) {
            icon = document.createElement('div');
            icon.className = 'swipe-icon';
            icon.style.cssText = `
                position: absolute;
                top: 50%;
                transform: translateY(-50%);
                width: 40px;
                height: 40px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 18px;
                z-index: 10;
                transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            `;
            element.appendChild(icon);
        }

        const icons = {
            check: '<i class="fas fa-check" style="color: white;"></i>',
            trash: '<i class="fas fa-trash" style="color: white;"></i>'
        };

        const colors = {
            check: 'background: linear-gradient(135deg, #22c55e, #16a34a);',
            trash: 'background: linear-gradient(135deg, #ef4444, #dc2626);'
        };

        icon.innerHTML = icons[iconType] || icons.check;
        icon.style.cssText += colors[iconType] || colors.check;
        icon.style[side] = '20px';
        icon.style.opacity = '1';
        icon.style.transform = 'translateY(-50%) scale(1)';
    }

    hideSwipeIcon(element) {
        const icon = element.querySelector('.swipe-icon');
        if (icon) {
            icon.style.opacity = '0';
            icon.style.transform = 'translateY(-50%) scale(0.8)';
        }
    }

    // 🔄 PULL-TO-REFRESH ДЛЯ ОБНОВЛЕНИЯ СПИСКА
    setupPullToRefresh() {
        let startY = 0;
        let currentY = 0;
        let isPulling = false;
        let pullIndicator = null;

        // Создаем индикатор pull-to-refresh
        this.createPullIndicator();

        this.notificationsList.addEventListener('touchstart', (e) => {
            if (this.notificationsList.scrollTop === 0) {
                startY = e.touches[0].clientY;
                isPulling = true;
            }
        }, { passive: true });

        this.notificationsList.addEventListener('touchmove', (e) => {
            if (!isPulling || this.isRefreshing) return;

            currentY = e.touches[0].clientY;
            const deltaY = currentY - startY;

            if (deltaY > 0 && this.notificationsList.scrollTop === 0) {
                e.preventDefault();

                const pullDistance = Math.min(deltaY, 120);
                const pullIndicator = document.getElementById('pull-refresh-indicator');

                if (pullIndicator) {
                    pullIndicator.style.transform = `translateY(${pullDistance}px)`;
                    pullIndicator.style.opacity = Math.min(pullDistance / this.pullThreshold, 1);

                    if (pullDistance > this.pullThreshold) {
                        pullIndicator.innerHTML = '<i class="fas fa-arrow-up" style="color: #22c55e;"></i>';
                        this.hapticFeedback('light');
                    } else {
                        pullIndicator.innerHTML = '<i class="fas fa-arrow-down" style="color: #6b7280;"></i>';
                    }
                }
            }
        }, { passive: false });

        this.notificationsList.addEventListener('touchend', (e) => {
            if (!isPulling) return;

            const deltaY = currentY - startY;
            const pullIndicator = document.getElementById('pull-refresh-indicator');

            if (deltaY > this.pullThreshold && !this.isRefreshing) {
                this.triggerRefresh();
            } else if (pullIndicator) {
                // Скрываем индикатор
                pullIndicator.style.transition = 'all 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
                pullIndicator.style.transform = 'translateY(-50px)';
                pullIndicator.style.opacity = '0';
            }

            isPulling = false;
        }, { passive: true });
    }

    createPullIndicator() {
        const indicator = document.createElement('div');
        indicator.id = 'pull-refresh-indicator';
        indicator.style.cssText = `
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%) translateY(-50px);
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            opacity: 0;
            z-index: 1000;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        `;
        indicator.innerHTML = '<i class="fas fa-arrow-down" style="color: #6b7280;"></i>';

        this.notificationsList.style.position = 'relative';
        this.notificationsList.appendChild(indicator);
    }

    async triggerRefresh() {
        if (this.isRefreshing) return;

        this.isRefreshing = true;
        const pullIndicator = document.getElementById('pull-refresh-indicator');

        if (pullIndicator) {
            pullIndicator.innerHTML = '<i class="fas fa-spinner fa-spin" style="color: #3b82f6;"></i>';
            pullIndicator.style.transform = 'translateX(-50%) translateY(20px)';
            pullIndicator.style.opacity = '1';
        }

        this.hapticFeedback('medium');

        // Симуляция загрузки (в реальном приложении здесь был бы API вызов)
        await new Promise(resolve => setTimeout(resolve, 1500));

        // Скрываем индикатор
        if (pullIndicator) {
            pullIndicator.style.transition = 'all 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
            pullIndicator.style.transform = 'translateX(-50%) translateY(-50px)';
            pullIndicator.style.opacity = '0';
        }

        this.isRefreshing = false;
        this.hapticFeedback('light');
        this.showRefreshToast('Уведомления обновлены');
    }

    // 📳 HAPTIC FEEDBACK
    setupHapticFeedback() {
        // Проверяем поддержку Vibration API
        this.supportsVibration = 'vibrate' in navigator;
        console.log(`[ModernUX] 📳 Haptic feedback: ${this.supportsVibration ? 'поддерживается' : 'не поддерживается'}`);
    }

    hapticFeedback(type = 'light') {
        if (!this.supportsVibration) return;

        const patterns = {
            light: [10],
            medium: [20],
            heavy: [30],
            success: [10, 50, 10],
            error: [50, 100, 50]
        };

        navigator.vibrate(patterns[type] || patterns.light);
    }

    // ✨ УЛУЧШЕННЫЕ АНИМАЦИИ
    setupImprovedAnimations() {
        // Добавляем CSS для улучшенных анимаций
        const style = document.createElement('style');
        style.textContent = `
            /* Улучшенные анимации для уведомлений */
            .notification-item {
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
            }

            .notification-item:hover {
                transform: translateY(-1px) scale(1.005) !important;
                box-shadow: 0 12px 24px rgba(15, 23, 42, 0.16) !important;
            }

            .notification-item:active {
                transform: translateY(0) scale(0.98) !important;
                transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1) !important;
            }

            /* Анимация появления новых уведомлений */
            @keyframes slideInFromTop {
                from {
                    transform: translateY(-100px) scale(0.9);
                    opacity: 0;
                }
                50% {
                    transform: translateY(10px) scale(1.05);
                    opacity: 0.8;
                }
                to {
                    transform: translateY(0) scale(1);
                    opacity: 1;
                }
            }

            .notification-item.new-notification {
                animation: slideInFromTop 0.6s cubic-bezier(0.4, 0, 0.2, 1) !important;
            }

            /* Улучшенные анимации кнопок */
            .action-btn, .footer-btn {
                transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1) !important;
            }

            .action-btn:active, .footer-btn:active {
                transform: scale(0.95) !important;
            }

            /* Плавные переходы для виджета */
            .modern-notifications-widget {
                transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1) !important;
            }

            /* Toast уведомления */
            .ux-toast {
                position: fixed;
                bottom: 100px;
                right: 20px;
                background: rgba(0, 0, 0, 0.8);
                color: white;
                padding: 12px 20px;
                border-radius: 12px;
                font-size: 14px;
                font-weight: 500;
                z-index: 1000000;
                -webkit-backdrop-filter: blur(10px);
                backdrop-filter: blur(10px);
                animation: toastSlideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }

            @keyframes toastSlideIn {
                from {
                    transform: translateX(100%);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }

            @keyframes toastSlideOut {
                from {
                    transform: translateX(0);
                    opacity: 1;
                }
                to {
                    transform: translateX(100%);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
    }

    // 🍞 TOAST УВЕДОМЛЕНИЯ
    showSwipeToast(message) {
        this.showToast(message, 'success');
    }

    showRefreshToast(message) {
        this.showToast(message, 'info');
    }

    showToast(message, type = 'info') {
        const toast = document.createElement('div');
        toast.className = 'ux-toast';
        toast.textContent = message;

        // Добавляем иконку в зависимости от типа
        const icons = {
            success: '✅',
            info: 'ℹ️',
            warning: '⚠️',
            error: '❌'
        };

        toast.innerHTML = `${icons[type] || icons.info} ${message}`;

        document.body.appendChild(toast);

        // Автоматическое удаление через 3 секунды
        setTimeout(() => {
            toast.style.animation = 'toastSlideOut 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
            setTimeout(() => {
                if (toast.parentNode) {
                    toast.remove();
                }
            }, 300);
        }, 3000);
    }

    // 🎯 ДОБАВЛЕНИЕ НОВЫХ УВЕДОМЛЕНИЙ С АНИМАЦИЕЙ
    addNotificationWithAnimation(notificationHTML) {
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = notificationHTML;
        const newNotification = tempDiv.firstElementChild;

        if (newNotification) {
            newNotification.classList.add('new-notification');
            this.notificationsList.insertBefore(newNotification, this.notificationsList.firstChild);
            this.hapticFeedback('light');

            // Убираем класс анимации после завершения
            setTimeout(() => {
                newNotification.classList.remove('new-notification');
            }, 600);
        }
    }
}
